<!DOCTYPE html>
<html>
<head>
  <title>Payment Success</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial;
      background: #f4f4f4;
    }
    .box {
      text-align: center;
      background: #fff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
    }
    .tick {
      font-size: 50px;
      color: green;
    }
  </style>
</head>
<body>

<div class="box">
  <div class="tick">✔</div>
  <h2>Payment Successful</h2>
  <p>Thank you for your donation!</p>
</div>

</body>
</html>
